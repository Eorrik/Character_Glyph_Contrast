<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Character Glyph Contrast</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Arial, sans-serif;
    }
    body {
      margin: 0;
      background: #f5f7fb;
      color: #1f2937;
    }
    .page {
      max-width: 1440px;
      margin: 0 auto;
      padding: 24px;
    }
    h1, h2, h3 { margin: 0 0 12px; }
    p { line-height: 1.6; }
    .layout {
      display: grid;
      grid-template-columns: minmax(0, 2fr) minmax(320px, 1fr);
      gap: 24px;
      align-items: start;
    }
    .card {
      background: white;
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
      padding: 18px;
    }
    .toolbar {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 12px;
    }
    .toolbar label, .segmented label {
      font-size: 14px;
      font-weight: 600;
      display: block;
      margin-bottom: 8px;
    }
    input[type="range"] { width: 100%; }
    .segmented {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .segmented button {
      border: none;
      border-radius: 999px;
      padding: 10px 16px;
      background: #e5e7eb;
      cursor: pointer;
      font-weight: 600;
    }
    .segmented button.active {
      background: #2563eb;
      color: white;
    }
    #viewer-wrapper {
      overflow: auto;
      border: 1px solid #dbe3f0;
      border-radius: 12px;
      background: #fff;
      min-height: 640px;
    }
    #viewer {
      image-rendering: pixelated;
      transform-origin: top left;
      display: block;
      margin: 0 auto;
      background: white;
    }
    .zoom-controls {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .zoom-controls button {
      border: none;
      background: #0f172a;
      color: white;
      border-radius: 8px;
      padding: 8px 12px;
      cursor: pointer;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 10px 8px;
      text-align: left;
    }
    .thumb-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
    }
    .thumb-grid canvas, .thumb-grid img {
      width: 100%;
      border: 1px solid #dbe3f0;
      border-radius: 10px;
      background: white;
      image-rendering: pixelated;
    }
    .status {
      padding: 12px 14px;
      border-radius: 10px;
      background: #eff6ff;
      color: #1d4ed8;
      margin-bottom: 16px;
      font-size: 14px;
    }
    @media (max-width: 1080px) {
      .layout { grid-template-columns: 1fr; }
      .toolbar { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1>字形结果图像对比原型</h1>
    <p>固定读取 <code>expert.jpg</code> 与 <code>user.jpg</code>，完成二值化、归一化、骨架叠加、EDT 热力图与差异指标展示。</p>
    <div id="status" class="status">正在加载图片并计算结果…</div>
    <div class="layout">
      <section class="card">
        <div class="segmented">
          <button data-view="overlay" class="active">骨架叠加</button>
          <button data-view="heatmap">EDT 热力图</button>
          <button data-view="combined">全部显示</button>
        </div>
        <div class="toolbar">
          <div>
            <label for="overlay-alpha">骨架透明度</label>
            <input id="overlay-alpha" type="range" min="0" max="1" step="0.05" value="0.85" />
          </div>
          <div>
            <label for="heatmap-alpha">热力图透明度</label>
            <input id="heatmap-alpha" type="range" min="0" max="1" step="0.05" value="0.75" />
          </div>
        </div>
        <div class="zoom-controls">
          <button id="zoom-out">- 缩小</button>
          <button id="zoom-reset">重置</button>
          <button id="zoom-in">+ 放大</button>
          <span id="zoom-label">100%</span>
        </div>
        <div id="viewer-wrapper">
          <canvas id="viewer" width="256" height="256"></canvas>
        </div>
      </section>
      <aside class="card">
        <h3>核心指标</h3>
        <table>
          <thead>
            <tr><th>Metric</th><th>Value</th></tr>
          </thead>
          <tbody id="metrics-body"></tbody>
        </table>
        <h3 style="margin-top: 20px;">标准化与结果预览</h3>
        <div class="thumb-grid">
          <div>
            <p>Expert Normalized</p>
            <canvas id="expert-thumb" width="256" height="256"></canvas>
          </div>
          <div>
            <p>User Normalized</p>
            <canvas id="user-thumb" width="256" height="256"></canvas>
          </div>
          <div>
            <p>Skeleton Overlay</p>
            <canvas id="overlay-thumb" width="256" height="256"></canvas>
          </div>
          <div>
            <p>EDT Heatmap</p>
            <canvas id="heatmap-thumb" width="256" height="256"></canvas>
          </div>
        </div>
      </aside>
    </div>
  </div>

  <script>
    const state = {
      view: 'overlay',
      overlayAlpha: 0.85,
      heatmapAlpha: 0.75,
      zoom: 1,
      result: null,
    };

    async function bootstrap() {
      try {
        const config = await fetch('/config.json').then((response) => response.json());
        const [expertImage, userImage] = await Promise.all([
          loadImage(config.expertImage),
          loadImage(config.userImage),
        ]);
        state.result = compareGlyphs(expertImage, userImage, config.canvasSize, config.padding);
        bindUi();
        renderAll();
        updateStatus('处理完成：已生成骨架叠加、EDT 热力图和差异指标。', false);
      } catch (error) {
        console.error(error);
        updateStatus(`加载失败：${error.message}`, true);
      }
    }

    function updateStatus(message, isError) {
      const el = document.getElementById('status');
      el.textContent = message;
      el.style.background = isError ? '#fef2f2' : '#eff6ff';
      el.style.color = isError ? '#b91c1c' : '#1d4ed8';
    }

    function bindUi() {
      document.querySelectorAll('.segmented button').forEach((button) => {
        button.addEventListener('click', () => {
          state.view = button.dataset.view;
          document.querySelectorAll('.segmented button').forEach((item) => item.classList.toggle('active', item === button));
          renderViewer();
        });
      });
      document.getElementById('overlay-alpha').addEventListener('input', (event) => {
        state.overlayAlpha = Number(event.target.value);
        renderViewer();
      });
      document.getElementById('heatmap-alpha').addEventListener('input', (event) => {
        state.heatmapAlpha = Number(event.target.value);
        renderViewer();
      });
      document.getElementById('zoom-in').addEventListener('click', () => setZoom(state.zoom + 0.25));
      document.getElementById('zoom-out').addEventListener('click', () => setZoom(Math.max(0.5, state.zoom - 0.25)));
      document.getElementById('zoom-reset').addEventListener('click', () => setZoom(1));
    }

    function setZoom(value) {
      state.zoom = value;
      const viewer = document.getElementById('viewer');
      viewer.style.transform = `scale(${state.zoom})`;
      document.getElementById('zoom-label').textContent = `${Math.round(state.zoom * 100)}%`;
    }

    function renderAll() {
      renderViewer();
      renderMetrics();
      renderThumb('expert-thumb', state.result.expert.normalized, drawBinaryPixel);
      renderThumb('user-thumb', state.result.user.normalized, drawBinaryPixel);
      renderThumb('overlay-thumb', state.result.overlay, drawRgbPixel);
      renderThumb('heatmap-thumb', state.result.heatmapRgb, drawRgbPixel);
    }

    function renderViewer() {
      const canvas = document.getElementById('viewer');
      const ctx = canvas.getContext('2d');
      const imageData = ctx.createImageData(canvas.width, canvas.height);
      for (let i = 0; i < canvas.width * canvas.height; i += 1) {
        const rgb = compositePixel(i);
        imageData.data[i * 4 + 0] = rgb[0];
        imageData.data[i * 4 + 1] = rgb[1];
        imageData.data[i * 4 + 2] = rgb[2];
        imageData.data[i * 4 + 3] = 255;
      }
      ctx.putImageData(imageData, 0, 0);
      setZoom(state.zoom);
    }

    function compositePixel(index) {
      const overlay = state.result.overlay[index];
      const heatmap = state.result.heatmapRgb[index];
      const white = [255, 255, 255];
      if (state.view === 'overlay') {
        return blend(white, overlay, state.overlayAlpha);
      }
      if (state.view === 'heatmap') {
        return blend(white, heatmap, state.heatmapAlpha);
      }
      return blend(blend(white, heatmap, state.heatmapAlpha), overlay, state.overlayAlpha);
    }

    function blend(base, top, alpha) {
      return base.map((value, index) => Math.round(value * (1 - alpha) + top[index] * alpha));
    }

    function renderMetrics() {
      const tbody = document.getElementById('metrics-body');
      tbody.innerHTML = '';
      Object.entries(state.result.metrics).forEach(([key, value]) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `<td>${key}</td><td>${value.toFixed(4)}</td>`;
        tbody.appendChild(tr);
      });
    }

    function renderThumb(canvasId, data, pixelRenderer) {
      const canvas = document.getElementById(canvasId);
      const ctx = canvas.getContext('2d');
      const imageData = ctx.createImageData(canvas.width, canvas.height);
      for (let i = 0; i < canvas.width * canvas.height; i += 1) {
        const rgb = pixelRenderer(data[i]);
        imageData.data[i * 4 + 0] = rgb[0];
        imageData.data[i * 4 + 1] = rgb[1];
        imageData.data[i * 4 + 2] = rgb[2];
        imageData.data[i * 4 + 3] = 255;
      }
      ctx.putImageData(imageData, 0, 0);
    }

    function drawBinaryPixel(value) {
      return value ? [0, 0, 0] : [255, 255, 255];
    }

    function drawRgbPixel(value) {
      return value;
    }

    function loadImage(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = () => reject(new Error(`无法读取图片：${src}`));
        img.src = src;
      });
    }

    function compareGlyphs(expertImage, userImage, canvasSize, padding) {
      const expert = processGlyph(expertImage, canvasSize, padding);
      const user = processGlyph(userImage, canvasSize, padding);
      const overlay = createOverlay(expert.skeleton, user.skeleton);
      const edtDiff = createEdtDiff(expert.normalized, user.normalized, expert.edt, user.edt);
      const heatmapRgb = createHeatmapRgb(edtDiff);
      const metrics = computeMetrics(expert, user, edtDiff);
      return { expert, user, overlay, heatmapRgb, metrics };
    }

    function processGlyph(image, canvasSize, padding) {
      const grayscale = imageToGrayscale(image);
      const binary = binarize(grayscale);
      const normalized = normalizeBinary(binary, grayscale.width, grayscale.height, canvasSize, padding);
      const skeleton = zhangSuenSkeleton(normalized, canvasSize, canvasSize);
      const edt = chamferDistanceTransform(normalized, canvasSize, canvasSize);
      return { grayscale, binary, normalized, skeleton, edt };
    }

    function imageToGrayscale(image) {
      const canvas = document.createElement('canvas');
      canvas.width = image.naturalWidth || image.width;
      canvas.height = image.naturalHeight || image.height;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(image, 0, 0);
      const pixels = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
      const gray = new Float32Array(canvas.width * canvas.height);
      for (let i = 0; i < gray.length; i += 1) {
        const r = pixels[i * 4 + 0];
        const g = pixels[i * 4 + 1];
        const b = pixels[i * 4 + 2];
        gray[i] = (0.299 * r + 0.587 * g + 0.114 * b) / 255;
      }
      gray.width = canvas.width;
      gray.height = canvas.height;
      return gray;
    }

    function binarize(gray) {
      const threshold = otsuThreshold(gray);
      const binary = new Uint8Array(gray.length);
      let foreground = 0;
      for (let i = 0; i < gray.length; i += 1) {
        binary[i] = gray[i] < threshold ? 1 : 0;
        foreground += binary[i];
      }
      if (foreground > gray.length * 0.5) {
        for (let i = 0; i < binary.length; i += 1) binary[i] = binary[i] ? 0 : 1;
      }
      return majorityFilter(binary, gray.width, gray.height);
    }

    function otsuThreshold(gray) {
      const histogram = new Uint32Array(256);
      for (let i = 0; i < gray.length; i += 1) histogram[Math.round(gray[i] * 255)] += 1;
      let total = gray.length;
      let sum = 0;
      for (let i = 0; i < 256; i += 1) sum += i * histogram[i];
      let sumB = 0;
      let wB = 0;
      let maxVariance = -1;
      let threshold = 127;
      for (let i = 0; i < 256; i += 1) {
        wB += histogram[i];
        if (wB === 0) continue;
        const wF = total - wB;
        if (wF === 0) break;
        sumB += i * histogram[i];
        const mB = sumB / wB;
        const mF = (sum - sumB) / wF;
        const variance = wB * wF * (mB - mF) * (mB - mF);
        if (variance > maxVariance) {
          maxVariance = variance;
          threshold = i;
        }
      }
      return threshold / 255;
    }

    function majorityFilter(binary, width, height) {
      const filtered = new Uint8Array(binary.length);
      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          let votes = 0;
          let samples = 0;
          for (let dy = -1; dy <= 1; dy += 1) {
            for (let dx = -1; dx <= 1; dx += 1) {
              const nx = x + dx;
              const ny = y + dy;
              if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
                votes += binary[ny * width + nx];
                samples += 1;
              }
            }
          }
          filtered[y * width + x] = votes >= Math.ceil(samples / 2) ? 1 : 0;
        }
      }
      return filtered;
    }

    function normalizeBinary(binary, width, height, canvasSize, padding) {
      let minX = width, minY = height, maxX = -1, maxY = -1;
      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          if (binary[y * width + x]) {
            minX = Math.min(minX, x);
            minY = Math.min(minY, y);
            maxX = Math.max(maxX, x);
            maxY = Math.max(maxY, y);
          }
        }
      }
      const output = new Uint8Array(canvasSize * canvasSize);
      if (maxX < minX || maxY < minY) return output;

      const cropWidth = maxX - minX + 1;
      const cropHeight = maxY - minY + 1;
      const target = canvasSize - padding * 2;
      const scale = Math.min(target / cropWidth, target / cropHeight);
      const newWidth = Math.max(1, Math.round(cropWidth * scale));
      const newHeight = Math.max(1, Math.round(cropHeight * scale));
      const xOffset = Math.floor((canvasSize - newWidth) / 2);
      const yOffset = Math.floor((canvasSize - newHeight) / 2);

      for (let y = 0; y < newHeight; y += 1) {
        for (let x = 0; x < newWidth; x += 1) {
          const srcX = Math.min(maxX, minX + Math.floor((x / newWidth) * cropWidth));
          const srcY = Math.min(maxY, minY + Math.floor((y / newHeight) * cropHeight));
          output[(y + yOffset) * canvasSize + (x + xOffset)] = binary[srcY * width + srcX];
        }
      }
      return output;
    }

    function zhangSuenSkeleton(binary, width, height) {
      const img = new Uint8Array(binary);
      let changed = true;
      while (changed) {
        changed = false;
        const toRemove = [];
        for (let y = 1; y < height - 1; y += 1) {
          for (let x = 1; x < width - 1; x += 1) {
            const index = y * width + x;
            if (!img[index]) continue;
            const p2 = img[(y - 1) * width + x];
            const p3 = img[(y - 1) * width + x + 1];
            const p4 = img[y * width + x + 1];
            const p5 = img[(y + 1) * width + x + 1];
            const p6 = img[(y + 1) * width + x];
            const p7 = img[(y + 1) * width + x - 1];
            const p8 = img[y * width + x - 1];
            const p9 = img[(y - 1) * width + x - 1];
            const neighbors = p2 + p3 + p4 + p5 + p6 + p7 + p8 + p9;
            const transitions = countTransitions([p2, p3, p4, p5, p6, p7, p8, p9, p2]);
            if (neighbors >= 2 && neighbors <= 6 && transitions === 1 && p2 * p4 * p6 === 0 && p4 * p6 * p8 === 0) {
              toRemove.push(index);
            }
          }
        }
        if (toRemove.length) {
          changed = true;
          toRemove.forEach((index) => { img[index] = 0; });
        }
        toRemove.length = 0;
        for (let y = 1; y < height - 1; y += 1) {
          for (let x = 1; x < width - 1; x += 1) {
            const index = y * width + x;
            if (!img[index]) continue;
            const p2 = img[(y - 1) * width + x];
            const p3 = img[(y - 1) * width + x + 1];
            const p4 = img[y * width + x + 1];
            const p5 = img[(y + 1) * width + x + 1];
            const p6 = img[(y + 1) * width + x];
            const p7 = img[(y + 1) * width + x - 1];
            const p8 = img[y * width + x - 1];
            const p9 = img[(y - 1) * width + x - 1];
            const neighbors = p2 + p3 + p4 + p5 + p6 + p7 + p8 + p9;
            const transitions = countTransitions([p2, p3, p4, p5, p6, p7, p8, p9, p2]);
            if (neighbors >= 2 && neighbors <= 6 && transitions === 1 && p2 * p4 * p8 === 0 && p2 * p6 * p8 === 0) {
              toRemove.push(index);
            }
          }
        }
        if (toRemove.length) {
          changed = true;
          toRemove.forEach((index) => { img[index] = 0; });
        }
      }
      return img;
    }

    function countTransitions(values) {
      let transitions = 0;
      for (let i = 0; i < values.length - 1; i += 1) {
        if (values[i] === 0 && values[i + 1] === 1) transitions += 1;
      }
      return transitions;
    }

    function chamferDistanceTransform(binary, width, height) {
      const inf = 1e9;
      const dist = new Float32Array(binary.length);
      for (let i = 0; i < binary.length; i += 1) dist[i] = binary[i] ? 0 : inf;

      const forward = [
        [-1, 0, 3], [0, -1, 3], [-1, -1, 4], [1, -1, 4],
      ];
      const backward = [
        [1, 0, 3], [0, 1, 3], [1, 1, 4], [-1, 1, 4],
      ];

      for (let y = 0; y < height; y += 1) {
        for (let x = 0; x < width; x += 1) {
          const index = y * width + x;
          forward.forEach(([dx, dy, weight]) => {
            const nx = x + dx;
            const ny = y + dy;
            if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
              dist[index] = Math.min(dist[index], dist[ny * width + nx] + weight);
            }
          });
        }
      }

      for (let y = height - 1; y >= 0; y -= 1) {
        for (let x = width - 1; x >= 0; x -= 1) {
          const index = y * width + x;
          backward.forEach(([dx, dy, weight]) => {
            const nx = x + dx;
            const ny = y + dy;
            if (nx >= 0 && nx < width && ny >= 0 && ny < height) {
              dist[index] = Math.min(dist[index], dist[ny * width + nx] + weight);
            }
          });
        }
      }

      for (let i = 0; i < dist.length; i += 1) dist[i] /= 3;
      return dist;
    }

    function createOverlay(expertSkeleton, userSkeleton) {
      const overlay = new Array(expertSkeleton.length);
      for (let i = 0; i < expertSkeleton.length; i += 1) {
        const expert = expertSkeleton[i];
        const user = userSkeleton[i];
        if (expert && user) overlay[i] = [255, 214, 10];
        else if (expert) overlay[i] = [34, 197, 94];
        else if (user) overlay[i] = [239, 68, 68];
        else overlay[i] = [255, 255, 255];
      }
      return overlay;
    }

    function createEdtDiff(expertMask, userMask, expertEdt, userEdt) {
      const diff = new Float32Array(expertMask.length);
      for (let i = 0; i < diff.length; i += 1) {
        const inUnion = expertMask[i] || userMask[i];
        diff[i] = inUnion ? Math.abs(userEdt[i] - expertEdt[i]) : 0;
      }
      return diff;
    }

    function createHeatmapRgb(diff) {
      let maxValue = 0;
      for (let i = 0; i < diff.length; i += 1) maxValue = Math.max(maxValue, diff[i]);
      if (maxValue === 0) maxValue = 1;
      const rgb = new Array(diff.length);
      for (let i = 0; i < diff.length; i += 1) {
        const t = diff[i] / maxValue;
        const red = Math.round(44 + t * (220 - 44));
        const green = Math.round(160 + (1 - t) * 80 - t * 120);
        const blue = Math.round(44 * (1 - t));
        rgb[i] = [Math.max(0, Math.min(255, red)), Math.max(0, Math.min(255, green)), Math.max(0, Math.min(255, blue))];
      }
      return rgb;
    }

    function computeMetrics(expert, user, edtDiff) {
      const expertPoints = maskToPoints(expert.skeleton, 256);
      const userPoints = maskToPoints(user.skeleton, 256);
      return {
        symmetric_chamfer: symmetricChamfer(expertPoints, userPoints),
        hausdorff: hausdorffDistance(expertPoints, userPoints),
        mean_edt_diff: meanValue(edtDiff),
        max_edt_diff: maxValue(edtDiff),
        overlap_ratio: overlapRatio(expert.normalized, user.normalized),
      };
    }

    function maskToPoints(mask, width) {
      const points = [];
      for (let i = 0; i < mask.length; i += 1) {
        if (mask[i]) points.push([i % width, Math.floor(i / width)]);
      }
      if (!points.length) points.push([0, 0]);
      return points;
    }

    function symmetricChamfer(pointsA, pointsB) {
      return (averageMinDistance(pointsA, pointsB) + averageMinDistance(pointsB, pointsA)) / 2;
    }

    function averageMinDistance(source, target) {
      let total = 0;
      source.forEach((point) => {
        total += minDistance(point, target);
      });
      return total / source.length;
    }

    function hausdorffDistance(pointsA, pointsB) {
      return Math.max(maxMinDistance(pointsA, pointsB), maxMinDistance(pointsB, pointsA));
    }

    function maxMinDistance(source, target) {
      let maxDistance = 0;
      source.forEach((point) => {
        maxDistance = Math.max(maxDistance, minDistance(point, target));
      });
      return maxDistance;
    }

    function minDistance(point, targets) {
      let best = Infinity;
      targets.forEach((candidate) => {
        const dx = point[0] - candidate[0];
        const dy = point[1] - candidate[1];
        best = Math.min(best, Math.sqrt(dx * dx + dy * dy));
      });
      return best;
    }

    function meanValue(data) {
      let total = 0;
      for (let i = 0; i < data.length; i += 1) total += data[i];
      return total / data.length;
    }

    function maxValue(data) {
      let max = 0;
      for (let i = 0; i < data.length; i += 1) max = Math.max(max, data[i]);
      return max;
    }

    function overlapRatio(maskA, maskB) {
      let intersection = 0;
      let union = 0;
      for (let i = 0; i < maskA.length; i += 1) {
        const a = maskA[i];
        const b = maskB[i];
        if (a || b) union += 1;
        if (a && b) intersection += 1;
      }
      return union === 0 ? 1 : intersection / union;
    }
